name: Rust Build

on:
  push:
    paths:
      - "rust/tgbot/**"
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache (依赖包缓存)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust/tgbot -> target"

      - name: Cache UPX
        id: cache-upx
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/upx
          key: ${{ runner.os }}-upx-v4.2.2

      - name: Install UPX
        if: steps.cache-upx.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/upx/upx/releases/download/v4.2.2/upx-4.2.2-amd64_linux.tar.xz
          tar -xJf upx-4.2.2-amd64_linux.tar.xz
          sudo cp upx-4.2.2-amd64_linux/upx /usr/local/bin/
          rm -rf upx-4.2.2-amd64_linux*

      - name: Build
        run: |
          cd rust/tgbot
          cargo build --release

      - name: Compress Binary
        run: upx --best --lzma rust/tgbot/target/release/tgbot

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tgbot
          path: rust/tgbot/target/release/tgbot

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: tgbot
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: tgbot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
